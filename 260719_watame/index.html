        src="hololive_frirends.jpg"

        width="350px"

      />

      <div class="text-content">

        <ol>
          <li>
            <strong>官方正版授權:</strong>100%

            >大小適中好攜帶，出門帶著打卡拍照超方便，隨時隨地有綿芽相伴！
          </li>
        </ol>
        <div class="action-area">
          <p id="totalPriceDisplay" class="totalPriceDisplay">總金額:$1500</p>
          <input type="number" min="1" value="1" class="qty-input" />
          <button class="buy-btn">立刻下單</button>

      </div>
    </div>
    <script src="script.js"></script>

</html>
